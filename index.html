<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chania Bus & Spiagge - Guida Completa</title>
  <style>
    :root {
      --bg: #F2F2F7;
      --card-bg: #FFFFFF;
      --text: #000000;
      --text-main: #2C2C2E;
      --text-sec: #6E6E73;
      --accent: #007AFF;
      --accent-bg: #E5F1FF;
      --warning-bg: #FFF8E5;
      --warning-text: #B25E00;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      padding-bottom: 60px;
      -webkit-font-smoothing: antialiased;
    }

    header { text-align: center; margin: 10px 0 24px 0; }
    h1 { font-size: 30px; font-weight: 800; margin: 0 0 8px 0; letter-spacing: -0.5px; }
    p.subtitle { font-size: 16px; color: var(--text-sec); margin: 0; font-weight: 500; }

    /* Selettore a 3 pulsanti per includere l'Aeroporto */
    .segmented-control {
      display: flex;
      background: #E5E5EA;
      border-radius: 16px;
      padding: 5px;
      margin-bottom: 24px;
      position: sticky;
      top: 10px;
      z-index: 100;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    .segment-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 6px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text);
      text-align: center;
    }

    .segment-btn.active {
      background: var(--card-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      color: var(--accent);
    }

    .beach-card {
      background: var(--card-bg);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 6px 20px var(--shadow);
      margin-bottom: 28px;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .card-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background-color: #E5E5EA;
      display: block;
      color: var(--text-sec);
      text-align: center;
      line-height: 220px;
      font-size: 15px;
    }

    .card-content { padding: 22px; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .beach-title { font-size: 26px; font-weight: 800; margin: 0; color: #000; }
    
    .time-badge {
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 16px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 12px;
      white-space: nowrap;
    }

    /* Riquadro ad alto contrasto per indicare il bus da prendere */
    .bus-line-box {
      background: var(--warning-bg);
      color: var(--warning-text);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      border-left: 5px solid #FF9500;
      line-height: 1.4;
    }

    .bus-line-box strong {
      color: #000;
      font-weight: 800;
      display: block;
      margin-top: 2px;
      font-size: 17px;
    }

    .description {
      font-size: 18px;
      color: var(--text-main);
      line-height: 1.55;
      margin: 0 0 24px 0;
      font-weight: 400;
    }

    .actions { display: flex; gap: 12px; margin-bottom: 16px; }

    .btn {
      flex: 1;
      padding: 16px 10px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .btn-maps { background: #E5E5EA; color: #000; }
    .btn-time { background: var(--accent); color: white; }
    .btn:active { opacity: 0.7; }

    .timetable-section {
      display: none;
      border-top: 2px solid #F2F2F7;
      padding-top: 18px;
      margin-top: 10px;
    }
    .timetable-section.open { display: block; }

    .direction-toggle { display: flex; gap: 10px; margin-bottom: 16px; }

    .dir-tab {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      background: #F2F2F7;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-sec);
    }
    .dir-tab.active { background: #34C759; color: white; }

    .times-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
    }

    .time-slot {
      background: #F2F2F7;
      padding: 12px 4px;
      border-radius: 12px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: #000;
    }
    
    .note-freq {
      font-size: 15px;
      color: var(--text-sec);
      font-style: italic;
      margin-bottom: 14px;
      text-align: center;
    }
  </style>
</head>

            <div class="card-header">
              <h2 class="beach-title">${item.name}</h2>
              <div class="time-badge">⏱️ ~${item.timeMinutes} min</div>

                <button id="btn-from-${item.id}" class="dir-tab" onclick="switchRoute('${item.id}', 'from')">${labelFrom}</button>
              </div>
              <div id="freq-${item.id}" class="note-freq">${item.freqNote}</div>
              <div id="grid-${item.id}" class="times-grid">
                ${renderTimeSlots(item.times.to)}
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderTimeSlots(timesArray) {
      return timesArray.map(time => `<div class="time-slot">${time}</div>`).join('');
    }

    function setDirection(dir, btnElement) {
      currentDirection = dir;
      document.querySelectorAll('.segment-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      renderDestinations();
    }

    function toggleTimetable(id) {
      const section = document.getElementById(`timetable-${id}`);
      section.classList.toggle('open');
    }

    function switchRoute(id, direction) {
      const item = destinations.find(b => b.id === id);
      const grid = document.getElementById(`grid-${id}`);
      const btnTo = document.getElementById(`btn-to-${id}`);
      const btnFrom = document.getElementById(`btn-from-${id}`);

      if (direction === 'to') {
        grid.innerHTML = renderTimeSlots(item.times.to);
        btnTo.classList.add('active');
        btnFrom.classList.remove('active');
      } else {
        grid.innerHTML = renderTimeSlots(item.times.from);
        btnFrom.classList.add('active');
        btnTo.classList.remove('active');
      }
    }

    // Caricamento iniziale
    renderDestinations();
  </script>
</body>
</html>
